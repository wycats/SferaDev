title = "Document where auth errors surface to users: showErrorMessage calls, ERROR_MESSAGES constants, silent vs non-silent getApiKey"
status = "completed"
completed_at = "2026-02-13T22:01:50.625990066+00:00"
completion_log = "Error surfaces: AUTH_FAILED toast (non-silent getApiKey), API_KEY_NOT_FOUND in chat response, VERCEL_CLI_NOT_LOGGED_IN toast (OIDC), 'Authentication management failed' toast, 'Failed to {action} session' toast (except OIDC errors silenced). Silent paths: getApiKey(true) never shows UI, OIDC refresh failures only logged."

