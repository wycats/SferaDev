[[plan.goals.tasks]]
id = "audit-auth-flow::trace-getapikey-paths"
title = "Trace getApiKey() in provider.ts: document env var check, getSession() call, CLI token fallback, and error handling"
status = "completed"
completed_at = "2026-02-13T22:01:32.464901686+00:00"
completion_log = "getApiKey(silent): env var check (VERCEL_API_KEY/OPENRESPONSES_API_KEY) → getSession() → CLI token fallback → undefined. Non-silent shows AUTH_FAILED toast on getSession error. Silent returns undefined. Non-silent undefined throws API_KEY_NOT_FOUND in chat."

[[plan.goals.tasks]]
id = "audit-auth-flow::trace-session-creation"
title = "Trace createSession() in auth.ts: document promptForAuthMethod, createApiKeySession vs createOidcSession paths, error propagation"
status = "completed"
completed_at = "2026-02-13T22:01:38.949777325+00:00"
completion_log = "createSession → promptForAuthMethod (api-key always, oidc if CLI available) → createApiKeySession (name+key prompt) or createOidcSession (CLI auth + interactive team/project). Cancellation throws 'Authentication method required'. Errors propagate to manageAuthentication toast."

[[plan.goals.tasks]]
id = "audit-auth-flow::trace-oidc-refresh"
title = "Trace refreshOidcSession() in auth.ts: document token expiry check, refreshOidcToken call, error handling when refresh fails"
status = "completed"
completed_at = "2026-02-13T22:01:44.401555319+00:00"
completion_log = "refreshOidcSession: if no oidcData returns unchanged. Otherwise calls refreshOidcToken which checks isExpired(expiresAt) with 15min TOKEN_REFRESH_MARGIN. Throws on CLI auth missing or refresh failure. Callers (getSessions, getActiveSession) catch and log, keep old session — no UI."

[[plan.goals.tasks]]
